# Server
server.port=8080
spring.application.name=overseas-portal

# Database (PostgreSQL - production)
spring.datasource.url=jdbc:postgresql://localhost:5432/overseas_portal
 spring.datasource.username=postgres
 spring.datasource.password=postgres
 spring.datasource.driver-class-name=org.postgresql.Driver



# Database (H2 - development)
#spring.datasource.url=jdbc:h2:mem:overseas_portal;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
#spring.datasource.driver-class-name=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console

# JPA / Hibernate
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=always
spring.jpa.open-in-view=false

spring.jpa.defer-datasource-initialization=true

# JWT
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# File Storage (local)
file.upload-dir=./uploads

# AWS S3 (optional)
aws.s3.bucket=overseas-portal-files
aws.s3.region=us-east-1
# aws.access-key=YOUR_ACCESS_KEY
# aws.secret-key=YOUR_SECRET_KEY

# Logging
logging.level.com.overseas.portal=DEBUG
logging.level.org.springframework.security=DEBUG

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
